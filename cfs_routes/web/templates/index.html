<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFS Preferred IFR Routes</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/vendor/choices/choices.min.css">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<nav class="navbar bg-body-secondary border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 fw-semibold" data-i18n="app.title">CFS Mandatory IFR Routes</span>
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-secondary"
              data-help-topic="help">
        <i class="bi bi-book-fill"></i>
      </button>
      <span class="badge text-bg-secondary font-mono" id="cycle-badge" data-i18n="ui.loading">Loading…</span>
    </div>
  </div>
</nav>

<main class="container-fluid py-3">
  <div class="d-flex align-items-center gap-2 mb-3">
    <select id="from-select">
      <option value="" data-i18n="form.airport_placeholder">Select controlled airport (CTRL+K)</option>
    </select>
    <button class="btn btn-primary btn-sm" id="add-row-btn">
      <i class="bi bi-plus-lg"></i> <span data-i18n="form.add">Add</span>
    </button>
  </div>

  <div id="rows-container"></div>
</main>

<!-- Help modal -->
<div class="modal fade" id="help-modal" tabindex="-1" aria-labelledby="help-modal-title" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title font-mono mb-0" id="help-modal-title"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="help-modal-body"></div>
    </div>
  </div>
</div>

<!-- Route modal -->
<div class="modal fade" id="route-modal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title font-mono mb-0" id="modal-title"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/static/vendor/choices/choices.min.js"></script>
<script src="/static/vendor/markjs/mark.min.js"></script>
<script src="/static/js/i18n.js"></script>
<script src="/static/js/shortcuts.js"></script>
<script src="/static/js/help.js"></script>
<script src="/static/js/index.js"></script>
</body>
</html>
